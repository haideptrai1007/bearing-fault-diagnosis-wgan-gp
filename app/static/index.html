<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fault Diagnosis</title>
  <style>@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --red: #fc3c44;
  --red-glow: rgba(252, 60, 68, 0.35);
  --red-soft: rgba(252, 60, 68, 0.12);
  --pink: #ff6b8a;
  --surface: rgba(255, 255, 255, 0.06);
  --surface-hover: rgba(255, 255, 255, 0.10);
  --surface-active: rgba(255, 255, 255, 0.14);
  --border: rgba(255, 255, 255, 0.10);
  --border-bright: rgba(255, 255, 255, 0.20);
  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.55);
  --text-tertiary: rgba(255, 255, 255, 0.30);
  --bg-dark: #0a0a0f;
  --success: #30d158;
  --success-soft: rgba(48, 209, 88, 0.15);
  --danger: #fc3c44;
  --danger-soft: rgba(252, 60, 68, 0.15);
}

html, body {
  min-height: 100vh;
  background: var(--bg-dark);
  font-family: 'Outfit', -apple-system, sans-serif;
  color: var(--text-primary);
  overflow-x: hidden;
}

/* ── Background ── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: orb-drift 18s ease-in-out infinite alternate;
}

.orb-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(252,60,68,0.25) 0%, transparent 70%);
  top: -200px; left: -150px;
  animation-delay: 0s;
}

.orb-2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(120,40,200,0.18) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation-delay: -6s;
}

.orb-3 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,107,138,0.12) 0%, transparent 70%);
  top: 40%; left: 50%;
  animation-delay: -12s;
}

@keyframes orb-drift {
  0%   { transform: translate(0, 0) scale(1); }
  33%  { transform: translate(40px, -30px) scale(1.05); }
  66%  { transform: translate(-20px, 40px) scale(0.97); }
  100% { transform: translate(30px, 20px) scale(1.03); }
}

.noise-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
}

/* ── Layout ── */
.page {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 3rem 1.5rem 4rem;
}

.app-container {
  width: 100%;
  max-width: 560px;
  animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Header ── */
.app-header {
  text-align: center;
  margin-bottom: 2.5rem;
  animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both;
}

.app-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #fc3c44 0%, #ff6b8a 50%, #c62fa0 100%);
  border-radius: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1rem;
  box-shadow: 0 8px 32px rgba(252, 60, 68, 0.4), 0 0 0 1px rgba(255,255,255,0.1);
  animation: icon-pulse 3s ease-in-out infinite;
}

@keyframes icon-pulse {
  0%, 100% { box-shadow: 0 8px 32px rgba(252, 60, 68, 0.4), 0 0 0 1px rgba(255,255,255,0.1); }
  50%       { box-shadow: 0 8px 48px rgba(252, 60, 68, 0.6), 0 0 0 1px rgba(255,255,255,0.15); }
}

.app-icon svg {
  width: 30px; height: 30px;
  fill: white;
}

.app-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.65) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.app-subtitle {
  margin-top: 4px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-tertiary);
  letter-spacing: 0.02em;
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 12px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  transition: border-color 0.2s, background 0.2s;
  animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.card:nth-child(1) { animation-delay: 0.10s; }
.card:nth-child(2) { animation-delay: 0.16s; }
.card:nth-child(3) { animation-delay: 0.22s; }

.card:hover {
  border-color: var(--border-bright);
  background: var(--surface-hover);
}

.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}

/* ── Button Groups ── */
.btn-group {
  display: flex;
  gap: 8px;
}

.tab-btn {
  flex: 1;
  padding: 10px 8px;
  border: 0.5px solid var(--border);
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  overflow: hidden;
}

.tab-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.2s;
}

.tab-btn:hover {
  border-color: var(--border-bright);
  color: var(--text-primary);
  background: var(--surface-hover);
  transform: translateY(-1px);
}

.tab-btn:hover::before { opacity: 1; }

.tab-btn:active { transform: translateY(0) scale(0.98); }

.tab-btn.active {
  background: linear-gradient(135deg, var(--red) 0%, #c62fa0 100%);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 20px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.2);
}

.tab-btn.active::before { opacity: 0; }

/* ── Signal Input ── */
.input-wrap {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  pointer-events: none;
  display: flex;
  align-items: center;
}

.signal-input {
  width: 100%;
  padding: 12px 14px 12px 40px;
  background: rgba(255,255,255,0.05);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  font-weight: 400;
  color: var(--text-primary);
  outline: none;
  transition: all 0.2s;
  letter-spacing: 0.01em;
}

.signal-input::placeholder { color: var(--text-tertiary); }

.signal-input:focus {
  border-color: rgba(252, 60, 68, 0.5);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 0 3px rgba(252, 60, 68, 0.12);
}

/* ── Run Button ── */
.run-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--red) 0%, #e0274f 50%, #c62fa0 100%);
  background-size: 200% 200%;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
  transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.18s;
  box-shadow: 0 4px 24px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.18);
  animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.28s both;
  animation: gradient-shift 4s ease infinite, fade-up 0.6s cubic-bezier(0.22,1,0.36,1) 0.28s both;
}

@keyframes gradient-shift {
  0%, 100% { background-position: 0% 50%; }
  50%       { background-position: 100% 50%; }
}

.run-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.12) 0%, transparent 100%);
  pointer-events: none;
}

.run-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.2);
}

.run-btn:active:not(:disabled) {
  transform: translateY(0) scale(0.99);
  box-shadow: 0 2px 12px var(--red-glow);
}

.run-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
}

.btn-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* ── Ripple ── */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transform: scale(0);
  animation: ripple-expand 0.5s linear;
  pointer-events: none;
}

@keyframes ripple-expand {
  to { transform: scale(4); opacity: 0; }
}

/* ── Spinner ── */
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Result Card ── */
.result-card {
  margin-top: 12px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 1.5rem;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1), transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.3s;
  pointer-events: none;
}

.result-card.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

.result-card.success { border-color: rgba(48, 209, 88, 0.25); }
.result-card.error   { border-color: rgba(252, 60, 68, 0.25); }

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}

.result-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.03em;
}

.badge-success { background: var(--success-soft); color: var(--success); border: 0.5px solid rgba(48,209,88,0.25); }
.badge-pending { background: rgba(255,255,255,0.06); color: var(--text-secondary); border: 0.5px solid var(--border); }
.badge-error   { background: var(--danger-soft); color: var(--danger); border: 0.5px solid rgba(252,60,68,0.25); }

/* ── Metrics ── */
.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.25rem;
}

.metric-card {
  background: rgba(255,255,255,0.04);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 1rem 1.1rem;
  transition: border-color 0.3s;
}

.metric-card.highlight { border-color: rgba(252,60,68,0.2); }

.metric-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}

.metric-value {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text-primary);
  line-height: 1;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

.metric-value.accent {
  background: linear-gradient(135deg, var(--red), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Confidence Bar ── */
.confidence-section { margin-bottom: 1rem; }

.confidence-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.confidence-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

.confidence-pct {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
}

.bar-track {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--red) 0%, var(--pink) 100%);
  width: 0%;
  transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 0 8px var(--red-glow);
}

/* ── Status ── */
.status-line {
  font-size: 12px;
  color: var(--text-tertiary);
  text-align: center;
  padding-top: 0.5rem;
  border-top: 0.5px solid var(--border);
  min-height: 20px;
  transition: color 0.2s;
}

.status-line.error { color: rgba(252, 60, 68, 0.7); }

/* ── Waveform decoration ── */
.waveform {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 20px;
}

.wave-bar {
  width: 3px;
  border-radius: 2px;
  background: linear-gradient(to top, var(--red), var(--pink));
  animation: wave-animate 1.2s ease-in-out infinite;
  opacity: 0.7;
}

.wave-bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
.wave-bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
.wave-bar:nth-child(4) { height: 12px; animation-delay: 0.3s; }
.wave-bar:nth-child(5) { height: 18px; animation-delay: 0.15s; }
.wave-bar:nth-child(6) { height: 10px; animation-delay: 0.25s; }
.wave-bar:nth-child(7) { height: 16px; animation-delay: 0.05s; }

@keyframes wave-animate {
  0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
  50%       { transform: scaleY(1);   opacity: 1; }
}

.waveform.idle .wave-bar { animation-play-state: paused; transform: scaleY(0.3); }

/* ── Number pop animation ── */
@keyframes number-pop {
  0%   { transform: scale(0.7); opacity: 0; }
  60%  { transform: scale(1.1); }
  100% { transform: scale(1);   opacity: 1; }
}

.pop { animation: number-pop 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }
</style>
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-canvas">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
  </div>
  <div class="noise-overlay"></div>

  <div class="page">
    <div class="app-container">

      <!-- Header -->
      <div class="app-header">
        <div class="app-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 12 Q4 6 6 12 Q8 18 10 12 Q12 6 14 12 Q16 18 18 12 Q20 6 22 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="app-title">Fault Diagnosis</h1>
        <p class="app-subtitle">Vibration signal classification · CWRU dataset</p>
      </div>

      <!-- 1. Transform -->
      <div class="card">
        <div class="section-label">Transform</div>
        <div class="btn-group">
          <button class="tab-btn active" id="tab-cwt" onclick="switchTransform('cwt')">CWT — Scalogram</button>
          <button class="tab-btn" id="tab-stft" onclick="switchTransform('stft')">STFT — Spectrogram</button>
        </div>
      </div>

      <!-- 2. Model -->
      <div class="card">
        <div class="section-label">Model</div>
        <div class="btn-group">
          <button class="tab-btn active" id="btn-MobileOneS0"  onclick="selectModel('MobileOneS0')">MobileOne S0</button>
          <button class="tab-btn"        id="btn-MobileNetV4"  onclick="selectModel('MobileNetV4')">MobileNet V4</button>
          <button class="tab-btn"        id="btn-GhostNetV2"   onclick="selectModel('GhostNetV2')">GhostNet V2</button>
          <button class="tab-btn"        id="btn-EdgeNeXtXXS"  onclick="selectModel('EdgeNeXtXXS')">EdgeNeXt XXS</button>
        </div>
      </div>

      <!-- 3. Signal input -->
      <div class="card">
        <div class="section-label">Signal input</div>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/>
            </svg>
          </span>
          <input
            class="signal-input"
            type="text"
            id="signal-path"
            placeholder="e.g. D:\Capstone\dataset\raw\97.mat"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>

      <!-- Run button -->
      <button class="run-btn" id="run-btn" onclick="runDiagnosis()">
        <div class="btn-inner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          Run diagnosis
        </div>
      </button>

      <!-- Result card -->
      <div class="result-card" id="result-card">
        <div class="result-header">
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="waveform idle" id="waveform">
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
            </div>
            <span class="result-title">Result</span>
          </div>
          <span class="badge badge-pending" id="result-badge">Pending</span>
        </div>

        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-label">Fault class</div>
            <div class="metric-value" id="label-val">—</div>
          </div>
          <div class="metric-card highlight">
            <div class="metric-label">Confidence</div>
            <div class="metric-value accent" id="conf-val">—</div>
          </div>
        </div>

        <div class="confidence-section">
          <div class="confidence-header">
            <span class="confidence-label">Confidence level</span>
            <span class="confidence-pct" id="conf-pct"></span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" id="conf-bar"></div>
          </div>
        </div>

        <div class="status-line" id="status-line"></div>
      </div>

    </div>
  </div>

  <script>const MODEL_KEYS = ['MobileOneS0', 'MobileNetV4', 'GhostNetV2', 'EdgeNeXtXXS'];

const MODEL_PATHS = {
  cwt: {
    MobileOneS0: "D:\\Capstone\\models\\ONNX\\CNN\\SCALOGRAM\\MobileOneS0\\best_model.onnx",
    MobileNetV4: "D:\\Capstone\\models\\ONNX\\CNN\\SCALOGRAM\\MobileNetV4\\best_model.onnx",
    GhostNetV2:  "D:\\Capstone\\models\\ONNX\\CNN\\SCALOGRAM\\GhostNetV2\\best_model.onnx",
    EdgeNeXtXXS: "D:\\Capstone\\models\\ONNX\\CNN\\SCALOGRAM\\EdgenextXXS\\best_model.onnx",
  },
  stft: {
    MobileOneS0: "D:\\Capstone\\models\\ONNX\\CNN\\SPECTROGRAM\\MobileOneS0\\best_model.onnx",
    MobileNetV4: "D:\\Capstone\\models\\ONNX\\CNN\\SPECTROGRAM\\MobileNetV4\\best_model.onnx",
    GhostNetV2:  "D:\\Capstone\\models\\ONNX\\CNN\\SPECTROGRAM\\GhostNetV2\\best_model.onnx",
    EdgeNeXtXXS: "D:\\Capstone\\models\\ONNX\\CNN\\SPECTROGRAM\\EdgenextXXS\\best_model.onnx",
  },
};

let currentTransform = 'cwt';
let currentModel = 'MobileOneS0';
let isRunning = false;

// ── Transform switch ──────────────────────────────────────────
function switchTransform(t) {
  if (currentTransform === t) return;
  currentTransform = t;
  document.getElementById('tab-cwt').classList.toggle('active', t === 'cwt');
  document.getElementById('tab-stft').classList.toggle('active', t === 'stft');
}

// ── Model select ──────────────────────────────────────────────
function selectModel(m) {
  if (currentModel === m) return;
  currentModel = m;
  MODEL_KEYS.forEach(name => {
    document.getElementById('btn-' + name).classList.toggle('active', name === m);
  });
}

// ── Ripple effect ─────────────────────────────────────────────
function createRipple(e) {
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2;
  const x = e.clientX - rect.left - size / 2;
  const y = e.clientY - rect.top - size / 2;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

// ── Waveform control ──────────────────────────────────────────
function setWaveform(active) {
  document.getElementById('waveform').classList.toggle('idle', !active);
}

// ── Set badge ─────────────────────────────────────────────────
function setBadge(type, text) {
  const badge = document.getElementById('result-badge');
  badge.className = 'badge badge-' + type;
  badge.textContent = text;
}

// ── Animate number ────────────────────────────────────────────
function animateValue(el, value) {
  el.classList.remove('pop');
  void el.offsetWidth;
  el.textContent = value;
  el.classList.add('pop');
}

// ── Run diagnosis ─────────────────────────────────────────────
async function runDiagnosis() {
  if (isRunning) return;

  const modelPath  = MODEL_PATHS[currentTransform][currentModel];
  const signalPath = document.getElementById('signal-path').value.trim();
  const btn        = document.getElementById('run-btn');
  const resultCard = document.getElementById('result-card');
  const statusLine = document.getElementById('status-line');
  const labelVal   = document.getElementById('label-val');
  const confVal    = document.getElementById('conf-val');
  const confBar    = document.getElementById('conf-bar');
  const confPct    = document.getElementById('conf-pct');

  // Validation
  if (!signalPath) {
    resultCard.classList.add('visible', 'error');
    resultCard.classList.remove('success');
    setBadge('error', 'Error');
    animateValue(labelVal, '—');
    animateValue(confVal, '—');
    confBar.style.width = '0%';
    confPct.textContent = '';
    statusLine.className = 'status-line error';
    statusLine.textContent = 'Please fill in the signal file path.';
    setWaveform(false);
    return;
  }

  // Loading state
  isRunning = true;
  btn.disabled = true;
  btn.querySelector('.btn-inner').innerHTML = `<span class="spinner"></span>Analyzing…`;
  resultCard.classList.add('visible');
  resultCard.classList.remove('success', 'error');
  setBadge('pending', 'Running');
  animateValue(labelVal, '—');
  animateValue(confVal, '—');
  confBar.style.width = '0%';
  confPct.textContent = '';
  statusLine.className = 'status-line';
  statusLine.textContent = 'Sending to inference engine…';
  setWaveform(true);

  try {
    const response = await fetch('http://127.0.0.1:3636/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model_path: modelPath, signal_path: signalPath, transforms: currentTransform }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const pct  = Math.round(data.confidence * 100);

    // Success
    resultCard.classList.add('success');
    setBadge('success', 'Complete');
    animateValue(labelVal, data.label);
    animateValue(confVal, pct + '%');

    setTimeout(() => {
      confBar.style.width = pct + '%';
      confPct.textContent = pct + '%';
    }, 80);

    statusLine.className = 'status-line';
    statusLine.textContent = `${currentModel} · ${currentTransform.toUpperCase()} · ${new Date().toLocaleTimeString()}`;
    setWaveform(false);

  } catch (err) {
    resultCard.classList.add('error');
    setBadge('error', 'Error');
    animateValue(labelVal, '—');
    animateValue(confVal, '—');
    confBar.style.width = '0%';
    confPct.textContent = '';
    statusLine.className = 'status-line error';
    statusLine.textContent = err.message;
    setWaveform(false);
  } finally {
    isRunning = false;
    btn.disabled = false;
    btn.querySelector('.btn-inner').innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Run diagnosis`;
  }
}

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('run-btn').addEventListener('click', createRipple);

  document.getElementById('signal-path').addEventListener('keydown', e => {
    if (e.key === 'Enter') runDiagnosis();
  });
});
</script>
</body>
</html>
